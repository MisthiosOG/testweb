<!DOCTYPE html><html class="dark" lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>SkyNet Bot Interface</title>
<!-- Telegram Web App SDK — WAJIB ada -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
        body {
            background-color: #050505;
            background: radial-gradient(circle at top right, #0a192f 0%, #050505 100%);
            color: #e5e2e1;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.1s ease-out;
        }
        .ghost-border-primary {
            border: 1px solid rgba(0, 163, 255, 0.1);
        }
        .message-inbound {
            border-bottom-left-radius: 4px;
        }
        .message-outbound {
            border-bottom-right-radius: 4px;
            background: linear-gradient(135deg, #004a77 0%, #003354 100%);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "error-container": "#93000a",
                      "surface-tint": "#98cbff",
                      "on-secondary": "#313030",
                      "tertiary-container": "#eb8104",
                      "on-surface": "#e5e2e1",
                      "on-error": "#690005",
                      "surface-variant": "#353534",
                      "secondary": "#c8c6c5",
                      "on-tertiary-container": "#522900",
                      "error": "#ffb4ab",
                      "surface-container-low": "#1c1b1b",
                      "on-surface-variant": "#bec7d4",
                      "tertiary": "#ffb77d",
                      "on-primary": "#003354",
                      "on-primary-fixed": "#001d33",
                      "inverse-surface": "#e5e2e1",
                      "tertiary-fixed": "#ffdcc3",
                      "surface-container": "#201f1f",
                      "surface-container-highest": "#353534",
                      "tertiary-fixed-dim": "#ffb77d",
                      "secondary-fixed-dim": "#c8c6c5",
                      "outline": "#88919d",
                      "primary": "#98cbff",
                      "surface-bright": "#3a3939",
                      "secondary-container": "#474746",
                      "on-tertiary": "#4d2600",
                      "primary-fixed-dim": "#98cbff",
                      "surface": "#131313",
                      "primary-container": "#00a3ff",
                      "on-tertiary-fixed-variant": "#6e3900",
                      "surface-container-high": "#2a2a2a",
                      "primary-fixed": "#cfe5ff",
                      "surface-container-lowest": "#0e0e0e",
                      "inverse-on-surface": "#313030",
                      "on-primary-container": "#00375a",
                      "inverse-primary": "#00629d",
                      "on-secondary-fixed-variant": "#474746",
                      "on-error-container": "#ffdad6",
                      "on-secondary-fixed": "#1c1b1b",
                      "secondary-fixed": "#e5e2e1",
                      "on-tertiary-fixed": "#2f1500",
                      "on-background": "#e5e2e1",
                      "outline-variant": "#3f4852",
                      "surface-dim": "#131313",
                      "on-secondary-container": "#b7b5b4",
                      "on-primary-fixed-variant": "#004a77",
                      "background": "#131313"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-gap": "12px",
                      "unit": "4px",
                      "lg": "24px",
                      "xs": "4px",
                      "container-padding": "16px",
                      "md": "16px",
                      "xl": "32px",
                      "sm": "8px"
              },
              "fontFamily": {
                      "headline-md": ["Geist"],
                      "display-lg": ["Geist"],
                      "body-md": ["Manrope"],
                      "label-md": ["Geist"],
                      "label-sm": ["Geist"],
                      "display-sm": ["Geist"],
                      "body-lg": ["Manrope"]
              },
              "fontSize": {
                      "headline-md": ["20px", {"lineHeight": "1.4", "fontWeight": "500"}],
                      "display-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                      "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "label-md": ["13px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "label-sm": ["11px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "600"}],
                      "display-sm": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
              }
            },
          },
        }

</head>
<body class="bg-background text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant/10 flex justify-between items-center px-md py-sm">
<div class="flex items-center gap-sm">
<div class="relative">
<img alt="SkyNet Bot" class="w-10 h-10 rounded-full border border-outline-variant/20" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPPxbxaxhpJPwenL0LNXeI1JPnaDOsSQJ7DQYj0hQRfjF0HzIcD9IwXTZ38ymLwC8ZxxtzVupqJbrg8SNfTSVKxYH6ULI_KTRIT-dX-JJoW_la1BSSiOwp0tstg4dMijBEz-wqxS-q5TTkT1gUyHZai2F8V4LFNgjAGM_nlFZmO_cTi51OeQYI4oCNSz1gGql_OlxtlUnwKkRpYdlOs2G8-3T8KWnI1ETGCq83m_iWOW8NIxw2usx4dHTSYkCcdbXv95oU1IV42xI">
<div class="absolute bottom-0 right-0 w-3 h-3 bg-primary border-2 border-surface rounded-full shadow-[0_0_8px_rgba(152,203,255,0.6)]"></div>
</div>
<div class="flex flex-col">
<span class="font-headline-md text-headline-md font-bold text-primary tracking-tight">SkyNet Bot</span>
<span class="font-label-sm text-label-sm text-primary animate-pulse-slow">System Operational</span>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-20 pb-32 px-4 min-h-screen flex flex-col gap-4">
    <!-- Session Input Section -->
    <div class="glass-card p-4 rounded-2xl shadow-xl">
        <label class="block text-[10px] text-primary/70 mb-2 font-bold uppercase tracking-[0.2em]">Session Access</label>
        <textarea id="sessionInput" rows="3" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-xs focus:ring-1 focus:ring-primary/50 outline-none resize-none transition-all font-mono" placeholder='Paste JSON/Lua code here...'></textarea>
        <div class="flex gap-2 mt-3">
            <button onclick="handleLogin()" class="flex-1 bg-primary/90 hover:bg-primary text-on-primary py-2.5 rounded-xl text-xs font-bold active:scale-95 transition-all shadow-lg shadow-primary/20">INITIALIZE</button>
        </div>
    </div>

    <!-- Automation Actions Grid -->
    <div class="grid grid-cols-3 gap-3">
        <button onclick="runFeature('Farm')" class="glass-card p-3 rounded-2xl flex flex-col items-center gap-2 hover:bg-white/5 transition-all active:scale-95">
            <span class="material-symbols-outlined text-primary text-2xl">Agriculture</span>
            <span class="text-[11px] font-medium">Farm</span>
        </button>
        <button onclick="runFeature('Quest')" class="glass-card p-3 rounded-2xl flex flex-col items-center gap-2 hover:bg-white/5 transition-all active:scale-95">
            <span class="material-symbols-outlined text-primary text-2xl">Assignment</span>
            <span class="text-[11px] font-medium">Quest</span>
        </button>
        <button onclick="runFeature('Eden')" class="glass-card p-3 rounded-2xl flex flex-col items-center gap-2 hover:bg-white/5 transition-all active:scale-95">
            <span class="material-symbols-outlined text-error/80 text-2xl">Local_Fire_Department</span>
            <span class="text-[11px] font-medium">Eden</span>
        </button>
        <button onclick="runFeature('Wings')" class="glass-card p-3 rounded-2xl flex flex-col items-center gap-2 hover:bg-white/5 transition-all active:scale-95">
            <span class="material-symbols-outlined text-primary text-2xl">Flight</span>
            <span class="text-[11px] font-medium">Wings</span>
        </button>
        <button onclick="runFeature('Map')" class="glass-card p-3 rounded-2xl flex flex-col items-center gap-2 hover:bg-white/5 transition-all active:scale-95">
            <span class="material-symbols-outlined text-primary text-2xl">map</span>
            <span class="text-[11px] font-medium">Map</span>
        </button>
        <button onclick="runFeature('Emotes')" class="glass-card p-3 rounded-2xl flex flex-col items-center gap-2 hover:bg-white/5 transition-all active:scale-95">
            <span class="material-symbols-outlined text-primary text-2xl">emoji_emotions</span>
            <span class="text-[11px] font-medium">Emotes</span>
        </button>
    </div>

    <!-- System Console / Logs -->
    <div class="flex-1 flex flex-col gap-2">
        <h3 class="text-[10px] text-on-surface-variant/60 font-bold uppercase tracking-widest px-1">System Console</h3>
        <div id="consoleLogs" class="bg-black/30 border border-white/5 rounded-2xl p-4 h-40 overflow-y-auto font-mono text-[10px] hide-scrollbar backdrop-blur-sm">
            <div class="text-primary-fixed-dim">[READY] System online... waiting for session.</div>
        </div>
    </div>
</main>
<!-- Fixed Bottom Controls -->
<div class="fixed bottom-0 w-full z-50">
<!-- Bottom Navigation Bar -->
<nav class="bg-surface/80 backdrop-blur-md border-t border-outline-variant/10 rounded-t-xl flex justify-around items-center h-16 w-full px-container-padding pb-safe">
<a class="flex flex-col items-center justify-center text-primary font-bold hover:text-primary/80 active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-md text-label-md">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary/80 active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">swap_horiz</span>
<span class="font-label-md text-label-md">Trade</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary/80 active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-label-md text-label-md">History</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary/80 active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-label-md text-label-md">Wallet</span>
</a>
</nav>
</div>
<script>
        // Init Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.querySelectorAll('.active\\:scale-95').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.style.transform = 'scale(0.95)';
            });
            button.addEventListener('mouseup', () => {
                button.style.transform = 'scale(1)';
            });
            button.addEventListener('mouseleave', () => {
                button.style.transform = 'scale(1)';
            });
        });

        // Dashboard Logic
        function addLog(msg, type = 'info') {
            const consoleLogs = document.getElementById('consoleLogs');
            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-error mb-1' : 'text-on-surface-variant mb-1';
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleLogs.prepend(div);
        }

        function handleLogin() {
            const code = document.getElementById('sessionInput').value;
            if(!code) return addLog('ERROR: Session code empty', 'error');
            addLog('Initializing session connection...');
            // Di sini nanti panggil API backend kamu
        }

        function runFeature(name) {
            addLog(`Executing feature: ${name}...`);
        }

        // Subtle parallax effect for glass cards on mouse move
        const cards = document.querySelectorAll('.glass-card');
        document.addEventListener('mousemove', (e) => {
            const amount = 5;
            const x = (e.clientX / window.innerWidth - 0.5) * amount;
            const y = (e.clientY / window.innerHeight - 0.5) * amount;
            
            cards.forEach(card => {
                card.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>

</body></html>
